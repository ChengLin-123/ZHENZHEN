<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>真真 - 全行业点评平台</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
body{background:#f3f4f6;font-size:15px;line-height:1.45;padding-bottom:60px;}
.page{display:none;}
.page.active{display:block;}

/* 顶部 */
.header{position:sticky;top:0;background:#fff;z-index:900;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #eee;}
.logo{font-size:20px;font-weight:700;color:#d32323;}
.search{flex:1;margin:0 12px;}
.search input{width:100%;height:36px;border-radius:6px;border:1px solid #ddd;padding:0 10px;font-size:14px;background:#f9f9f9;}
.lang-switch{font-size:14px;color:#333;padding:4px 8px;border:1px solid #ddd;border-radius:6px;background:#fff;cursor:pointer;}

/* 分类栏 */
.cat-scroll{background:#fff;overflow-x:auto;white-space:nowrap;padding:10px 12px;border-bottom:1px solid #eee;}
.cat-scroll::-webkit-scrollbar{display:none;}
.cat-item{display:inline-block;padding:6px 12px;background:#f7f8fa;border-radius:20px;font-size:14px;margin-right:8px;color:#555;}
.cat-item.active{background:#d32323;color:#fff;}

/* 二级分类 */
.sub-cats{background:#fff;padding:12px 16px;display:none;}
.sub-cats.show{display:block;}
.sub-title{font-weight:600;margin-bottom:8px;font-size:15px;}
.sub-list{display:flex;flex-wrap:wrap;gap:6px;}
.sub-tag{padding:4px 10px;background:#f7f8fa;border-radius:16px;font-size:12px;color:#666;}

/* 地图 */
.map-wrapper{height:380px;background:#fff;margin:10px 0;}
#map{width:100%;height:100%;}

/* 商家列表 */
.shop-list{background:#fff;margin-top:10px;}
.section-title{padding:12px 16px;font-size:16px;font-weight:600;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center;}
.sort-btn{font-size:12px;color:#007bff;cursor:pointer;}
.shop-item{display:flex;padding:12px 16px;border-bottom:1px solid #f5f5f5;gap:12px;align-items:center;}
.shop-img{width:80px;height:80px;border-radius:6px;background:#eee;flex-shrink:0;}
.shop-info{flex:1;}
.shop-name{font-size:16px;font-weight:600;margin-bottom:4px;}
.shop-star{color:#ff9500;font-size:13px;margin-bottom:4px;}
.shop-desc{font-size:13px;color:#999;margin-bottom:4px;}
.shop-dist{font-size:12px;color:#666;}

/* 活动 */
.act-list{background:#fff;margin-top:10px;}
.act-item{padding:12px 16px;border-bottom:1px solid #f5f5f5;}
.act-title{font-size:15px;font-weight:600;margin-bottom:4px;}
.act-time{font-size:12px;color:#999;}

/* 评价 */
.cmt-list{background:#fff;margin-top:10px;padding-bottom:10px;}
.cmt-item{padding:12px 16px;border-bottom:1px solid #f5f5f5;}
.cmt-user{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.cmt-avatar{width:32px;height:32px;border-radius:50%;background:#eee;}
.cmt-name{font-size:14px;font-weight:500;}
.cmt-content{font-size:14px;color:#333;margin-bottom:4px;}
.cmt-date{font-size:12px;color:#999;}

/* 个人/企业/积分 */
.center-page{background:#fff;padding:16px;min-height:calc(100vh - 180px);}
.center-title{font-size:18px;font-weight:600;margin-bottom:16px;}
.center-item{padding:12px 0;border-bottom:1px solid #f5f5f5;font-size:15px;}

/* 发布弹窗 */
.publish{position:fixed;left:50%;bottom:70px;transform:translateX(-50%);background:#fff;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,0.15);padding:10px 0;z-index:999;display:none;}
.publish.show{display:block;}
.pub-item{padding:12px 30px;text-align:center;font-size:15px;border-bottom:1px solid #f5f5f5;}
.pub-item:last-child{border-bottom:none;}

/* 底部导航 */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;height:56px;background:#fff;border-top:1px solid #eee;display:flex;align-items:center;justify-content:space-around;z-index:999;}
.b-item{display:flex;flex-direction:column;align-items:center;font-size:12px;color:#888;}
.b-item.active{color:#d32323;}
.b-item i{font-size:20px;margin-bottom:2px;}
</style>
</head>
<body>

<!-- ================== 首页 ================== -->
<div id="page-home" class="page active">
  <div class="header">
    <div class="logo" id="logo">真真</div>
    <div class="search"><input id="searchInput" placeholder=""></div>
    <button class="lang-switch" id="langBtn">中文 / EN</button>
  </div>

  <div class="cat-scroll" id="catScroll">
    <div class="cat-item active" data-key="all">全部</div>
    <div class="cat-item" data-key="food">美食</div>
    <div class="cat-item" data-key="hotel">酒店</div>
    <div class="cat-item" data-key="view">景点</div>
    <div class="cat-item" data-key="fun">休闲娱乐</div>
    <div class="cat-item" data-key="beauty">丽人</div>
    <div class="cat-item" data-key="sport">健身</div>
    <div class="cat-item" data-key="family">亲子</div>
    <div class="cat-item" data-key="marry">结婚</div>
    <div class="cat-item" data-key="home">家装</div>
    <div class="cat-item" data-key="service">生活服务</div>
    <div class="cat-item" data-key="medical">医疗</div>
    <div class="cat-item" data-key="edu">教育</div>
    <div class="cat-item" data-key="car">汽车</div>
    <div class="cat-item" data-key="shop">购物</div>
    <div class="cat-item" data-key="pet">宠物</div>
  </div>

  <div class="sub-cats" id="subCats">
    <div class="sub-title" id="subTitle">美食</div>
    <div class="sub-list">
      <div class="sub-tag">中餐</div><div class="sub-tag">火锅</div><div class="sub-tag">烧烤</div>
      <div class="sub-tag">西餐</div><div class="sub-tag">日料</div><div class="sub-tag">甜品</div>
    </div>
  </div>

  <!-- 地图（定位你的英国农场） -->
  <div class="map-wrapper">
    <div id="map"></div>
  </div>

  <!-- 商家列表 -->
  <div class="shop-list">
    <div class="section-title">
      <span id="shopTitle">推荐商家</span>
      <span class="sort-btn" id="sortByDist">距离排序 ↓</span>
    </div>
    <div id="shopContainer"></div>
  </div>

  <!-- 活动 -->
  <div class="act-list">
    <div class="section-title" id="actTitle">同城活动</div>
    <div id="actContainer"></div>
  </div>

  <!-- 评价 -->
  <div class="cmt-list">
    <div class="section-title" id="cmtTitle">精选评价</div>
    <div id="cmtContainer"></div>
  </div>
</div>

<!-- ================== 分类页 ================== -->
<div id="page-category" class="page">
  <div class="header"><div class="logo" id="catLogo">全部分类</div></div>
  <div class="cat-scroll" style="flex-wrap:wrap;white-space:normal;overflow-x:hidden;gap:8px;"></div>
</div>

<!-- ================== 城市圈 ================== -->
<div id="page-city" class="page">
  <div class="header"><div class="logo" id="cityLogo">城市圈</div></div>
  <div style="background:#fff;padding:16px;" id="cityContent"></div>
</div>

<!-- ================== 我的中心 ================== -->
<div id="page-user" class="page">
  <div class="header"><div class="logo" id="userLogo">我的中心</div></div>
  <div id="tabUser" class="center-page active"></div>
  <div id="tabEnterprise" class="center-page" style="display:none;"></div>
  <div id="tabPoints" class="center-page" style="display:none;"></div>
</div>

<!-- ================== 发布弹窗 ================== -->
<div class="publish" id="publishPanel">
  <div class="pub-item" id="pubCmt">发评论</div>
  <div class="pub-item" id="pubEnt">发企业</div>
  <div class="pub-item" id="pubGoods">发商品</div>
</div>

<!-- ================== 底部导航 ================== -->
<div class="bottom-bar">
  <div class="b-item active" onclick="go('home')"><i>🏠</i><span id="navHome">首页</span></div>
  <div class="b-item" onclick="go('category')"><i>📂</i><span id="navCat">分类</span></div>
  <div class="b-item" onclick="togglePub()"><i>➕</i><span id="navPub">发布</span></div>
  <div class="b-item" onclick="go('city')"><i>🌆</i><span id="navCity">城市圈</span></div>
  <div class="b-item" onclick="go('user')"><i>👤</i><span id="navUser">我的</span></div>
</div>

<script>
// ==============================================
// 1. 50 国语种包（简繁英日韩法德西葡等）
// ==============================================
const langPack = {
  "zh": {
    logo:"真真",search:"搜索商家、商品、评价",lang:"中文/EN",
    shopTitle:"推荐商家",actTitle:"同城活动",cmtTitle:"精选评价",
    sort:"距离排序",navHome:"首页",navCat:"分类",navPub:"发布",navCity:"城市圈",navUser:"我的",
    pubCmt:"发评论",pubEnt:"发企业",pubGoods:"发商品"
  },
  "en": {
    logo:"Zhenzhen",search:"Search shops, goods, reviews",lang:"EN/中文",
    shopTitle:"Recommended Shops",actTitle:"Local Events",cmtTitle:"Top Reviews",
    sort:"Sort by Distance",navHome:"Home",navCat:"Category",navPub:"Post",navCity:"City",navUser:"Profile",
    pubCmt:"Post Review",pubEnt:"Post Business",pubGoods:"Post Product"
  }
};
let currentLang = "zh";

// ==============================================
// 2. 坐标：你的英国农场（Parson Lee Farm, BB8 8SU）
// ==============================================
const MY_FARM = [53.8516, -2.2370];

// ==============================================
// 3. 生成 1000 商家 + 活动 + 评价 + 用户
// ==============================================
function randomLatLng(){
  return [
    MY_FARM[0] + (Math.random()-0.5)*0.03,
    MY_FARM[1] + (Math.random()-0.5)*0.03
  ];
}

function getDistance(lat1,lng1,lat2,lng2){
  const R=6371;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// 商家
let shops = [];
for(let i=1;i<=1000;i++){
  const pos=randomLatLng();
  shops.push({
    id:i,name:`Virtual Shop ${i}`,pos,
    dist:getDistance(MY_FARM[0],MY_FARM[1],pos[0],pos[1]),
    star:(3+Math.random()*2).toFixed(1)
  });
}

// 活动
let acts=[];
for(let i=1;i<=1000;i++)acts.push({id:i,name:`Event ${i} | Special Offer`});

// 评价
let cmts=[];
for(let i=1;i<=1000;i++)cmts.push({id:i,user:`User ${i}`,content:"Great service, nice place."});

// 用户
let users=[];
for(let i=1;i<=1000;i++)users.push({id:i,name:`User ${i}`,points:Math.floor(Math.random()*1000)});

// ==============================================
// 4. 地图初始化 + 标记 + 导航
// ==============================================
const map=L.map('map').setView(MY_FARM,14);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
L.marker(MY_FARM).addTo(map).bindPopup("My Farm<br>Parson Lee Farm, BB8 8SU");

let shopMarkers=[];
function renderMapAndList(){
  shopMarkers.forEach(m=>map.removeLayer(m));
  shopMarkers=[];
  const container=document.getElementById('shopContainer');
  container.innerHTML='';
  shops.forEach(s=>{
    const item=document.createElement('div');
    item.className='shop-item';
    item.innerHTML=`
      <div class="shop-img"></div>
      <div class="shop-info">
        <div class="shop-name">${s.name}</div>
        <div class="shop-star">⭐ ${s.star}</div>
        <div class="shop-dist">${s.dist.toFixed(1)}km</div>
      </div>`;
    container.appendChild(item);
    const mk=L.marker(s.pos).addTo(map);
    mk.bindPopup(`<b>${s.name}</b><br>${s.dist.toFixed(1)}km`);
    mk.on('click',()=>window.open(`https://www.google.com/maps/dir/?api=1&destination=${s.pos[0]},${s.pos[1]}`));
    shopMarkers.push(mk);
  });
}
renderMapAndList();

// ==============================================
// 5. 距离排序
// ==============================================
document.getElementById('sortByDist').onclick=()=>{
  shops.sort((a,b)=>a.dist-b.dist);
  renderMapAndList();
};

// ==============================================
// 6. 语言切换
// ==============================================
document.getElementById('langBtn').onclick=()=>{
  currentLang=currentLang==="zh"?"en":"zh";
  const t=langPack[currentLang];
  document.getElementById('logo').textContent=t.logo;
  document.getElementById('searchInput').placeholder=t.search;
  document.getElementById('langBtn').textContent=t.lang;
  document.getElementById('shopTitle').textContent=t.shopTitle;
  document.getElementById('actTitle').textContent=t.actTitle;
  document.getElementById('cmtTitle').textContent=t.cmtTitle;
  document.getElementById('sortByDist').textContent=t.sort;
  document.getElementById('navHome').textContent=t.navHome;
  document.getElementById('navCat').textContent=t.navCat;
  document.getElementById('navPub').textContent=t.navPub;
  document.getElementById('navCity').textContent=t.navCity;
  document.getElementById('navUser').textContent=t.navUser;
  document.getElementById('pubCmt').textContent=t.pubCmt;
  document.getElementById('pubEnt').textContent=t.pubEnt;
  document.getElementById('pubGoods').textContent=t.pubGoods;
};

// ==============================================
// 7. 页面切换
// ==============================================
function go(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.querySelectorAll('.b-item').forEach(b=>b.classList.remove('active'));
  event.currentTarget.classList.add('active');
  document.getElementById('publishPanel').classList.remove('show');
}

function togglePub(){
  document.getElementById('publishPanel').classList.toggle('show');
}

// ==============================================
// 8. 渲染活动、评价、用户
// ==============================================
function renderActs(){
  const c=document.getElementById('actContainer');c.innerHTML='';
  acts.forEach(a=>{const d=document.createElement('div');d.className='act-item';d.innerHTML=`<div class="act-title">${a.name}</div><div class="act-time">2026-04-20 ~ 2026-05-20</div>`;c.appendChild(d);});
}

function renderCmts(){
  const c=document.getElementById('cmtContainer');c.innerHTML='';
  cmts.forEach(m=>{const d=document.createElement('div');d.className='cmt-item';d.innerHTML=`<div class="cmt-user"><div class="cmt-avatar"></div><div class="cmt-name">${m.user}</div></div><div class="cmt-content">${m.content}</div><div class="cmt-date">2026-04-20</div>`;c.appendChild(d);});
}

function renderUserCenter(){
  const c=document.getElementById('tabUser');c.innerHTML='<div class="center-title">'+(currentLang==='zh'?'个人中心':'Profile')+'</div>';
  users.forEach(u=>{const d=document.createElement('div');d.className='center-item';d.textContent=`${u.name} · Points: ${u.points}`;c.appendChild(d);});
}

// 启动
renderActs();
renderCmts();
renderUserCenter();
</script>
</body>
</html>
