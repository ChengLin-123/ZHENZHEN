<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>真真 - 全行业真实点评平台</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui, sans-serif}
  body{background:#f5f5f5;padding-bottom:70px}
  .page{display:none}
  .page.active{display:block}

  /* 头部 */
  .header{background:#d32323;color:white;padding:16px;text-align:center;font-weight:bold;font-size:18px}
  
  /* 首页 */
  .search{margin:12px;padding:10px;background:white;border-radius:8px;border:1px solid #ddd}
  .banner{background:white;margin:0 12px 12px;padding:14px;border-radius:8px}
  .cat-scroll{display:flex;gap:12px;padding:0 12px;overflow-x:auto;margin-bottom:12px}
  .cat{white-space:nowrap;background:white;padding:8px 14px;border-radius:20px;font-size:14px}
  .list{padding:0 12px}
  .item{background:white;border-radius:8px;margin-bottom:10px;padding:12px}
  .item .title{font-weight:bold;margin-bottom:4px}
  .item .info{color:#666;font-size:14px}

  /* 分类页 */
  .cat-box{background:white;margin:12px;border-radius:8px;padding:14px}
  .cat-title{font-weight:bold;margin-bottom:8px}
  .sub{display:flex;flex-wrap:wrap;gap:8px}
  .sub span{background:#f0f0f0;padding:6px 10px;border-radius:6px}

  /* 发布页 */
  .card{background:white;margin:12px;border-radius:8px;padding:16px}
  .card h3{margin-bottom:10px}
  input,textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;margin-bottom:10px}
  .btn{background:#d32323;color:white;padding:12px;border-radius:8px;text-align:center}

  /* 朋友圈 */
  .post{background:white;margin:12px;border-radius:8px;padding:14px}
  .post .name{font-weight:bold}
  .post .text{margin:8px 0;line-height:1.5}
  .post .time{color:#999;font-size:12px}

  /* 我的 */
  .user-info{background:#d32323;color:white;padding:20px;text-align:center}
  .avatar{width:60px;height:60px;background:white;border-radius:50%;margin:0 auto 10px}
  .menu{background:white;margin:12px;border-radius:8px}
  .menu .row{padding:14px;border-bottom:1px solid #f0f0f0}
  .menu .row:last-child{border-bottom:none}

  /* 底部导航 */
  .nav{position:fixed;bottom:0;left:0;width:100%;height:70px;background:white;border-top:1px solid #eee;display:flex;justify-content:space-around;align-items:center}
  .nav a{display:flex;flex-direction:column;align-items:center;font-size:12px;color:#666;text-decoration:none}
  .nav a.active{color:#d32323}
  .nav .icon{font-size:22px;margin-bottom:4px}
</style>
</head>

<body>

<!-- 首页 -->
