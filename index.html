<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>真真 - 全行业真实点评平台</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft YaHei", sans-serif;
    }
    body {
      background: #f5f7fa;
      color: #333;
    }
    header {
      background: #2c3e50;
      color: white;
      padding: 16px 20px;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 20px;
    }
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-size: 24px;
      font-weight: bold;
    }
    .menu a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
    }
    .banner {
      background: #3498db;
      color: white;
      padding: 60px 20px;
      text-align: center;
    }
    .banner h1 {
      font-size: 32px;
      margin-bottom: 16px;
    }
    .section {
      padding: 40px 0;
    }
    .card-box {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px,1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .card {
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }
    .card-body {
      padding: 16px;
    }
    .card-title {
      font-size: 18px;
      margin-bottom: 8px;
      font-weight: bold;
    }
    .star {
      color: #f39c12;
      margin-bottom: 8px;
    }
    footer {
      background: #2c3e50;
      color: white;
      text-align: center;
      padding: 24px;
      margin-top: 40px;
    }
  </style>
</head>
<body>

<header>
  <div class="container nav">
    <div class="logo">真真</div>
    <div class="menu">
      <a href="#">首页</a>
      <a href="#">分类</a>
      <a href="#">排行榜</a>
      <a href="#">发布点评</a>
      <a href="#">我的</a>
    </div>
  </div>
</header>

<div class="banner">
  <div class="container">
    <h1>全行业真实点评，只看真话</h1>
    <p>查商家、看口碑、避坑、比价，都在真真平台</p>
  </div>
</div>

<div class="section container">
  <h2>热门推荐商家</h2>
  <div class="card-box">
    <div class="card">
      <img src="https://picsum.photos/600/400?random=1" alt="">
      <div class="card-body">
        <div class="card-title">优质餐饮服务</div>
        <div class="star">★★★★★ 4.9分</div>
        <p>服务好、环境干净、性价比高</p>
      </div>
    </div>
    <div class="card">
      <img src="https://picsum.photos/600/400?random=2" alt="">
      <div class="card-body">
        <div class="card-title">专业维修店铺</div>
        <div class="star">★★★★☆ 4.6分</div>
        <p>技术靠谱，收费透明，不坑人</p>
      </div>
    </div>
    <div class="card">
      <img src="https://picsum.photos/600/400?random=3" alt="">
      <div class="card-body">
        <div class="card-title">农场生鲜配送</div>
        <div class="star">★★★★★ 5.0分</div>
        <p>新鲜直达，品质稳定，回购率高</p>
      </div>
    </div>
  </div>
</div>

<div class="section container">
  <h2>最新真实点评</h2>
  <div class="card-box">
    <div class="card">
      <div class="card-body">
        <div class="card-title">用户：真实点评人</div>
        <div class="star">★★★★★</div>
        <p>这家店真的很良心，价格透明，服务到位，强烈推荐！</p>
      </div>
    </div>
    <div class="card">
      <div class="card-body">
        <div class="card-title">用户：理性消费者</div>
        <div class="star">★★★☆☆</div>
        <p>整体一般，性价比一般，不会主动推荐。</p>
      </div>
    </div>
  </div>
</div>

<footer>
  <div class="container">
    <p>真真 - 全行业真实点评平台 © 2025</p>
  </div>
</footer>

</body>
</html>
